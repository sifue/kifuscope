<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kifuscope 評価値</title>
  <link rel="stylesheet" href="/static/overlay.css">
</head>
<body>
  <main class="panel" aria-live="polite">
    <div class="players"><span>後手</span><span>先手</span></div>
    <div class="bar" aria-label="形勢バー">
      <div id="sente-bar" class="sente-bar"></div>
      <span id="bar-label" class="bar-label">互角</span>
    </div>
    <section class="details">
      <div id="score" class="score">評価待ち</div>
      <div class="move-row"><span>最善手</span><strong id="bestmove">—</strong></div>
      <div class="meta"><span id="depth">深さ —</span><span id="status">局面を待っています</span></div>
      <div id="controls" class="controls hidden">
        <button id="reset-tracker" type="button">追跡リセット</button>
        <button id="rebuild-reset" type="button">初期テンプレ再生成</button>
      </div>
    </section>
  </main>
  <script src="/static/overlay.js"></script>
</body>
</html>
